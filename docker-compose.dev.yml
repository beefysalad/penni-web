services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: ["sh", "-c", "npm run dev:docker"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://host.docker.internal:3000/api}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace_me}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  app_node_modules:
